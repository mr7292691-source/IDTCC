# Pragmatic lint config — catch real bugs, allow the project's column-aligned style.
line-length = 120
target-version = "py311"

[lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
    "E501",   # long lines (aligned tables are intentional)
    "E241",   # multiple spaces after comma (column alignment)
    "E272",   # multiple spaces before keyword
    "B008",   # FastAPI Depends()/Query() defaults in signatures
]

[lint.per-file-ignores]
"tests/*" = ["B", "F401"]
